# ============================================================
# Experiment 3: Full AEGIS  (Dataset A — DCASE2020 T2)
# Ablation table row 3: +classifier_fusion (cumulative over rows 1+2)
# ============================================================

experiment_name: "exp3_full_aegis"
dataset: "a"          # a = DCASE2020T2

baseline_root: "../dcase2023_task2_baseline_ae"
output_dir:    "../outputs/exp3_full_aegis"

seed:   13711
device: "auto"

machine_types:
  - fan
  - pump
  - slider
  - valve
  - ToyCar
  - ToyConveyor

# ------ Feature parameters (must match baseline for fair comparison) ------
feature:
  n_mels:           128
  frames:           64
  frame_hop_length: 8
  n_fft:            1024
  hop_length:       512
  power:            2.0
  fmin:             0.0
  fmax:             null
  win_length:       null

# ------ Model switches -------------------------------------------------------
model:
  conv_ae:            true    # always on
  freq_attention:     true    # Row 3: on (kept from row 2)
  classifier_fusion:  true    # Row 3: ON  (+section-ID classifier + score fusion)
  base_channels:      16
  latent_channels:    64

# ------ Classifier -----------------------------------------------------------
classifier:
  num_classes: 0        # auto-detect (DCASE2020T2: 3–4 sections per machine)
  loss_type:   "ce"     # cross-entropy on section ID; set "arcface" for ArcFace
  lambda_cls:  0.2      # λ — classification loss weight in joint loss

# ------ Score fusion ---------------------------------------------------------
fusion:
  weight: 0.3           # w — fused_score = z_recon + w * z_cls (per-section z-score)

# ------ Training hyperparameters (identical across all rows) -----------------
training:
  epochs:            50
  batch_size:        128
  learning_rate:     0.001
  weight_decay:      0.00001
  validation_split:  0.1
  staged:            false   # set true to do AE-only first, then CLF fine-tuning
  ae_epochs:         30
  clf_epochs:        20

# ------ Evaluation -----------------------------------------------------------
evaluation:
  max_fpr:             0.1
  threshold_quantile:  0.9
